name: Deploy to Maven Central

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm you want to publish to Maven Central'
        required: true
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation input
        if: ${{ github.event.inputs.confirm != 'deploy' }}
        run: |
          echo "Confirmation input did not match 'deploy'. Aborting."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Build and deploy
        run: mvn --batch-mode clean deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}